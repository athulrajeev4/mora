services:
  postgres:
    image: postgres:15
    container_name: mora_postgres
    environment:
      POSTGRES_USER: mora_user
      POSTGRES_PASSWORD: mora_password
      POSTGRES_DB: mora_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mora_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
